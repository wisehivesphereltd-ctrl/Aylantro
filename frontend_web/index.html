<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aylantro AI | The Future of Translation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #800000; /* Maroon */
            --primary-dark: #600000;
            --secondary: #D4AF37; /* Gold */
            --dark: #0f0f12;
            --light: #f8f9fa;
            --glass: rgba(30, 30, 38, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --dark: #f8f9fa;
            --glass: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text: #1a1a1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            transition: background-color 0.5s ease;
        }

        /* Neural Background */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
            border-radius: 50%;
        }

        nav {
            width: 100%;
            padding: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo i { color: var(--secondary); }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--secondary);
            transition: var(--transition);
        }

        .theme-toggle:hover { transform: rotate(15deg) scale(1.1); }

        .container {
            width: 90%;
            max-width: 1100px;
            margin-top: 2rem;
            padding-bottom: 5rem;
        }

        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 2rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 30px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            transition: var(--transition);
        }

        .card:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(128, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        select {
            background: rgba(128, 128, 128, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 14px;
            outline: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        textarea {
            width: 100%;
            height: 280px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 1.3rem;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        .output-text {
            min-height: 280px;
            font-size: 1.3rem;
            line-height: 1.6;
            color: var(--secondary);
            font-weight: 500;
        }

        .actions-bar {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 32px;
            border-radius: 18px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(128, 0, 0, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--dark);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        .typing-cursor {
            display: inline-block;
            width: 3px;
            height: 1em;
            background-color: var(--secondary);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .translator-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.5rem !important; }
        }
    </style>
</head>
<body>
    <div class="bg-glow" style="top: -10%; left: -10%;"></div>
    <div class="bg-glow" style="bottom: -10%; right: -10%; background: radial-gradient(circle, var(--secondary) 0%, transparent 70%);"></div>

    <nav>
        <div class="logo">
            <i class="fas fa-microchip"></i>
            <span>AYLANTRO AI</span>
        </div>
        <div class="nav-actions">
            <i class="fas fa-moon theme-toggle" id="themeToggle"></i>
            <div id="authContainer">
                <button class="btn-secondary" onclick="login()" style="padding: 10px 24px; font-size: 0.9rem;">
                    <i class="fab fa-google"></i> Login
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <header style="text-align: center; margin-bottom: 4rem;">
            <h1 style="font-size: 4rem; font-weight: 800; margin-bottom: 1rem; letter-spacing: -1px;">
                AI Intelligence <span id="typingEffect" style="color: var(--secondary)"></span><span class="typing-cursor"></span>
            </h1>
            <p style="color: var(--secondary); opacity: 0.8; font-size: 1.2rem; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;">Powered by GPT-4o & Google Neural Engines</p>
        </header>

        <div class="translator-grid">
            <div class="card">
                <div class="card-header">
                    <select id="sourceLang">
                        <option value="en">English</option>
                        <option value="ha">Hausa</option>
                        <option value="ig">Igbo</option>
                        <option value="yo">Yoruba</option>
                        <option value="fr">French</option>
                        <option value="ar">Arabic</option>
                    </select>
                    <i class="fas fa-keyboard" style="opacity: 0.2"></i>
                </div>
                <textarea id="inputText" placeholder="Enter text to translate..."></textarea>
            </div>

            <div class="card">
                <div class="card-header">
                    <select id="targetLang">
                        <option value="ha">Hausa</option>
                        <option value="en">English</option>
                        <option value="ig">Igbo</option>
                        <option value="yo">Yoruba</option>
                        <option value="fr">French</option>
                        <option value="ar">Arabic</option>
                    </select>
                    <button class="btn" style="padding: 8px; background: transparent; color: var(--secondary)" onclick="copyText()">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                <div id="outputText" class="output-text">Translation will appear here...</div>
            </div>
        </div>

        <div class="actions-bar">
            <button id="translateBtn" class="btn btn-primary">
                <div class="loader" id="loader"></div>
                <i class="fas fa-bolt" id="btnIcon"></i>
                Standard Translate
            </button>
            <button id="aiBtn" class="btn btn-secondary">
                <i class="fas fa-brain"></i>
                AI Context
            </button>
            <button class="btn" style="background: rgba(255,255,255,0.05); color: var(--text);">
                <i class="fas fa-file-pdf"></i>
                Docs
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        // Theme Toggle Logic
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        
        themeToggle.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            const isLight = body.classList.contains('light-mode');
            themeToggle.className = isLight ? 'fas fa-sun theme-toggle' : 'fas fa-moon theme-toggle';
        });

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Restore from previous if available
            authDomain: "aylanpro.firebaseapp.com",
            projectId: "aylanpro",
            storageBucket: "aylanpro.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Typing Effect
        const typingElement = document.getElementById('typingEffect');
        const phrases = ["Refined", "Unlimited", "Localized", "Aylantro"];
        let pIdx = 0, cIdx = 0, isDel = false;

        function type() {
            const current = phrases[pIdx];
            typingElement.textContent = isDel ? current.substring(0, cIdx - 1) : current.substring(0, cIdx + 1);
            cIdx = isDel ? cIdx - 1 : cIdx + 1;

            let speed = isDel ? 50 : 150;
            if (!isDel && cIdx === current.length) { speed = 2000; isDel = true; }
            else if (isDel && cIdx === 0) { isDel = false; pIdx = (pIdx + 1) % phrases.length; speed = 500; }
            setTimeout(type, speed);
        }
        type();

        // Translation Logic
        const API_BASE = 'https://aylanpro.wisehivesphere.com/api';
        
        async function translate() {
            const text = document.getElementById('inputText').value;
            if(!text) return;

            document.getElementById('loader').style.display = 'block';
            document.getElementById('btnIcon').style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/translate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text,
                        sourceLang: document.getElementById('sourceLang').value,
                        targetLang: document.getElementById('targetLang').value
                    })
                });
                const data = await response.json();
                document.getElementById('outputText').innerText = data.translatedText || "Error processing request.";
            } catch (err) {
                document.getElementById('outputText').innerText = "Service temporarily unavailable.";
            } finally {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('btnIcon').style.display = 'block';
            }
        }

        document.getElementById('translateBtn').addEventListener('click', translate);
        
        function copyText() {
            const text = document.getElementById('outputText').innerText;
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    </script>
</body>
</html>
